<!doctype html><html><head><meta charset=utf-8><title>AML Alert Triage - a demo by Ivan Skachek</title>
<meta name=viewport content="width=device-width,initial-scale=1">
<meta name="author" content="Ivan Skachek">
<meta name="description" content="A portfolio demo: deterministic rules score AML alerts (auditable), an LLM writes the analyst narrative but never the decision. Built by Ivan Skachek.">
<link rel="canonical" href="https://aml-triage-demo.vercel.app/">
<style>
*{box-sizing:border-box;margin:0;font-family:-apple-system,Inter,sans-serif}
body{background:#0B1120;color:#E7EAF0;display:flex;min-height:100vh;flex-wrap:wrap}
aside{width:340px;border-right:1px solid #1E2A44;padding:20px;overflow:auto}
main{flex:1;min-width:320px;padding:28px 36px;overflow:auto}
h1{font-size:16px;letter-spacing:.5px;color:#9FB0CC;font-weight:600;margin-bottom:4px}
.sub{font-size:12px;color:#61708C;margin-bottom:20px;line-height:1.5}
.card{padding:12px 14px;border:1px solid #1E2A44;border-radius:8px;margin-bottom:8px;cursor:pointer;transition:.15s}
.card:hover{border-color:#2A6B7C}.card.on{border-color:#00C2CB;background:#0f1b30}
.cid{font-size:12px;color:#61708C}.cust{font-weight:600;margin:2px 0}
.badge{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px}
.ESCALATE{background:#3a1420;color:#ff6b8a}.REVIEW{background:#3a2e14;color:#ffc861}.MONITOR{background:#123a2a;color:#4ade9b}
.score{float:right;font-weight:700}
.split{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-top:20px}
@media(max-width:820px){.split{grid-template-columns:1fr}}
.panel{border:1px solid #1E2A44;border-radius:10px;padding:18px}
.panel h2{font-size:13px;color:#9FB0CC;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.tag{font-size:11px;color:#61708C}
.factor{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #16223c;font-size:13px;gap:10px}
.pts{color:#00C2CB;font-weight:700;white-space:nowrap}
ul{margin:6px 0 12px 18px}li{margin:4px 0;font-size:13.5px;line-height:1.45}
.big{font-size:40px;font-weight:800}.muted{color:#61708C;font-size:12px}
.foot{margin-top:28px;font-size:12px;color:#61708C;line-height:1.6}
</style></head><body>
<aside><h1>ALERT QUEUE</h1><div class=sub>deterministic score, high to low</div><div id=q></div></aside>
<main id=m><h1>AML ALERT TRIAGE</h1><div class=sub>Select an alert. The score is computed by rules (auditable, reproducible). The narrative is written by Claude - it never changes the number.</div></main>
<script>
let DATA={alerts:[]};
function render(x,el){document.querySelectorAll('.card').forEach(c=>c.classList.remove('on'));if(el)el.classList.add('on');
const e=x.explanation;document.getElementById('m').innerHTML=`<h1>${x.id} · ${x.customer}</h1>
<div class=sub>${x.customer_profile} · ${x.period}</div><div class=split>
<div class=panel><h2>Deterministic score</h2>
<div class=big><span class="badge ${x.disposition}">${x.disposition}</span> ${x.score}<span class=muted>/100</span></div>
<div class=tag style="margin:10px 0">Rules that fired (auditable):</div>
${x.factors.map(f=>`<div class=factor><span>${f.rule}<br><span class=tag>${f.detail}</span></span><span class=pts>+${f.points}</span></div>`).join('')}</div>
<div class=panel><h2>AI explanation <span class=tag>(narrative only)</span></h2>
<b>${e.headline}</b><div class=tag style="margin:6px 0 12px">Typology: ${e.typology} · Action: ${e.disposition_restated}</div>
<div class=tag>Why it fired</div><ul>${(e.why_it_fired||[]).map(y=>`<li>${y}</li>`).join('')}</ul>
<div class=tag>What to check</div><ul>${(e.what_to_check||[]).map(y=>`<li>${y}</li>`).join('')}</ul>
${e._note?`<div class=tag>${e._note}</div>`:''}</div></div>
<div class=foot>The score and disposition come from a fixed rules table - reproducible and defensible to a regulator. The LLM only turns that output into analyst language; it cannot move the number. Deterministic core, AI at the edge. Narratives are pre-generated at build time: the live site makes no LLM call.
<div style="margin-top:16px;padding-top:14px;border-top:1px solid #1E2A44">
<b style="color:#9FB0CC">A portfolio project by Ivan Skachek.</b> Ran AML/KYC/KYT transaction monitoring inside a crypto exchange; now builds production AI agents.
<span style="display:inline-flex;gap:18px;flex-wrap:wrap;margin-top:10px">
<a href="https://www.linkedin.com/in/ivansflow/" target="_blank" rel="noopener" style="color:#00C2CB;font-weight:600">Connect on LinkedIn</a>
<a href="https://github.com/IvanSFlowGit/aml-triage-demo" target="_blank" rel="noopener" style="color:#00C2CB;font-weight:600">View source</a>
<a href="https://paypilot.fly.dev" target="_blank" rel="noopener" style="color:#00C2CB;font-weight:600">PayPilot (live agent)</a>
</span></div></div>`}
fetch('./data.json').then(r=>r.json()).then(d=>{DATA=d;
document.getElementById('q').innerHTML=d.alerts.map((x,i)=>`<div class=card id="c${i}">
<span class="badge ${x.disposition}">${x.disposition}</span><span class=score>${x.score}</span>
<div class=cid>${x.id}</div><div class=cust>${x.customer}</div></div>`).join('');
d.alerts.forEach((x,i)=>document.getElementById('c'+i).onclick=e=>render(x,e.currentTarget));
if(d.alerts[0])render(d.alerts[0],document.getElementById('c0'));});
</script></body></html>
